[tool:pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --disable-warnings
    --tb=short
    -ra
    -q
    --maxfail=10
    --durations=10
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --junitxml=test-results.xml
    --html=test-report.html
    --self-contained-html

# Timeout configuration
timeout = 5
timeout_method = thread

# Async configuration
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore::ResourceWarning

# Test markers for organization
markers =
    # Test types
    unit: Unit tests for individual functions and classes
    integration: Integration tests for component interactions
    api: API endpoint tests
    e2e: End-to-end workflow tests
    performance: Performance and load tests
    security: Security-related tests
    
    # Feature areas
    auth: Authentication and authorization tests
    jobs: Job-related functionality tests
    applications: Job application tests
    companies: Company management tests
    payments: Payment processing tests
    notifications: Notification system tests
    ai: AI and machine learning features
    crawler: Web crawling functionality
    
    # Test characteristics
    slow: Tests that take longer to execute
    flaky: Tests that may be unstable
    smoke: Basic functionality tests
    regression: Regression test suite
    
    # Environment
    local: Tests that run locally only
    ci: Tests that run in CI/CD pipeline
    staging: Tests for staging environment
    production: Tests for production environment

# Test execution options
minversion = 6.0
addopts = 
    # Parallel execution
    -n auto
    --dist=loadfile
    
    # Coverage settings
    --cov=backend
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    
    # Performance settings
    --durations=10
    --durations-min=0.1
    
    # Output formats
    --junitxml=test-results.xml
    --html=test-report.html
    --self-contained-html
    
    # Verbosity and reporting
    -v
    --tb=short
    -ra
    -q
    
    # Error handling
    --maxfail=10
    --strict-markers
    
    # Warnings
    --disable-warnings

# Coverage configuration
[tool:coverage.run]
source = backend
omit = 
    */tests/*
    */migrations/*
    */venv/*
    */env/*
    */__pycache__/*
    */node_modules/*
    setup.py
    conftest.py

[tool:coverage.report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Performance testing configuration
[tool:pytest.ini_options]
performance_timeout = 30
performance_threshold = 2.0
load_test_users = 100
load_test_duration = 60

# Security testing configuration
[tool:pytest.ini_options]
security_scan = true
vulnerability_check = true
auth_testing = true
input_validation = true

# Database testing configuration
[tool:pytest.ini_options]
db_cleanup = true
db_isolation = true
db_mock = true
db_performance = true

# Test data configuration
[tool:pytest.ini_options]
test_data_size = medium
test_data_realistic = true
test_data_cleanup = true
test_data_isolation = true

# Reporting configuration
[tool:pytest.ini_options]
report_format = html
report_include_metadata = true
report_include_coverage = true
report_include_performance = true
report_include_security = true

# CI/CD configuration
[tool:pytest.ini_options]
ci_fast_fail = true
ci_parallel = true
ci_coverage_min = 80
ci_performance_threshold = 2.0

# Environment-specific settings
[tool:pytest.ini_options]
env_testing = true
env_development = false
env_production = false
env_staging = false

# Plugin configuration
[tool:pytest.ini_options]
plugins = 
    pytest-asyncio
    pytest-cov
    pytest-timeout
    pytest-html
    pytest-xdist
    pytest-mock
    pytest-benchmark
    pytest-randomly
    pytest-repeat
    pytest-rerunfailures

# Custom test categories
[tool:pytest.ini_options]
test_categories = 
    critical: Critical functionality tests
    high: High priority tests
    medium: Medium priority tests
    low: Low priority tests
    optional: Optional tests

# Test execution strategies
[tool:pytest.ini_options]
execution_strategies = 
    fast: Quick test suite for development
    full: Complete test suite for CI/CD
    smoke: Basic functionality tests
    regression: Regression test suite
    performance: Performance test suite
    security: Security test suite

# Quality gates
[tool:pytest.ini_options]
quality_gates = 
    coverage_min = 80
    performance_max = 2.0
    security_score_min = 90
    test_pass_rate_min = 95

# Monitoring and alerting
[tool:pytest.ini_options]
monitoring = 
    test_execution_time = true
    test_failure_rate = true
    coverage_trend = true
    performance_regression = true
    security_vulnerabilities = true

# Documentation
[tool:pytest.ini_options]
documentation = 
    test_descriptions = true
    test_examples = true
    test_maintenance = true
    test_strategy = true